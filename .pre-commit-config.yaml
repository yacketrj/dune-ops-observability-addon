repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
      - id: check-yaml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: trivy
        name: trivy
        entry: trivy fs --scanners secret --severity HIGH,CRITICAL .
        language: system
        pass_filenames: false
        always_run: true
        verbose: false

      - id: semgrep
        name: semgrep
        entry: semgrep --error --config p/default
        language: system
        pass_filenames: false
        always_run: true
        verbose: false

      - id: validate-addon-manifest
        name: Validate addon manifest
        entry: node scripts/validate.js
        language: system
        pass_filenames: false
        files: ^(addon\.json|scripts/validate\.js)$
