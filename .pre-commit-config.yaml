repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
      - id: check-yaml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      # Note: a local `ggshield` hook is intentionally not configured here.
      # GitGuardian secret scanning for this repository runs via the
      # GitGuardian GitHub App integration ("GitGuardian Security Checks",
      # visible on every PR), which requires no repository secret. The
      # `ggshield` CLI itself requires a GITGUARDIAN_API_KEY to
      # authenticate; no such secret is configured for this repo
      # (`gh secret list` returns empty), so a local CLI-based hook would
      # fail with "Invalid GitGuardian API key" in CI rather than
      # providing additional coverage. If a GITGUARDIAN_API_KEY secret is
      # ever provisioned, this hook can be reintroduced with
      # `env: {GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}}`
      # wired through the calling workflow.
      - id: trivy
        name: trivy
        entry: trivy fs --scanners secret --severity HIGH,CRITICAL .
        language: system
        pass_filenames: false
        always_run: true
        verbose: false

      - id: semgrep
        name: semgrep
        entry: semgrep --error --config p/default
        language: system
        pass_filenames: false
        always_run: true
        verbose: false

      - id: validate-addon-manifest
        name: Validate addon manifest
        entry: node scripts/validate.js
        language: system
        pass_filenames: false
        files: ^(addon\.json|scripts/validate\.js)$

      - id: unit-tests
        name: Unit tests (node --test)
        entry: npm test
        language: system
        pass_filenames: false
        files: ^(web/|test/|package(-lock)?\.json)
