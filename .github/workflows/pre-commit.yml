name: Pre-commit

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: "npm"
      - uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
      - name: Install pre-commit and local hook tools
        run: |
          python -m pip install --upgrade pre-commit
          python -m pip install semgrep==1.170.0
      - name: Install npm dependencies
        # Required for the "Unit tests (node --test)" local hook, which runs
        # `npm test` — without this, that hook fails with "Cannot find
        # module 'jsdom'" (jsdom is a devDependency used only by
        # test/addon-rendering.test.js, never shipped in web/).
        run: npm ci
      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure
