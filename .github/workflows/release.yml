name: Release addon

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y zip
      - name: Validate addon
        run: node scripts/validate.js
      - name: Check tag matches addon version
        run: |
          ADDON_VERSION="$(node -e "process.stdout.write(require('./addon.json').version)")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$ADDON_VERSION" != "$TAG_VERSION" ]; then
            echo "addon.json version must match tag version"
            exit 1
          fi
      - name: Package addon
        run: bash scripts/package.sh
      - name: Generate SBOM
        run: |
          npm install --ignore-scripts || true
          npx @cyclonedx/cyclonedx-npm --output-file dist/sbom.json --output-format json 2>/dev/null || echo "SBOM generation skipped (no package.json or cyclonedx unavailable)"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ADDON_NAME="$(node -e "process.stdout.write(require('./addon.json').name)")"
          ADDON_VERSION="$(node -e "process.stdout.write(require('./addon.json').version)")"
          PACKAGE_PATH="$(find dist -maxdepth 1 -type f -name '*.zip' | sort | head -n 1)"
          CHECKSUM_PATH="${PACKAGE_PATH}.sha256"
          SBOM_PATH="dist/sbom.json"
          RELEASE_ARGS="$PACKAGE_PATH $CHECKSUM_PATH"
          if [ -f "$SBOM_PATH" ]; then
            RELEASE_ARGS="$RELEASE_ARGS $SBOM_PATH"
          fi
          gh release create "$GITHUB_REF_NAME" $RELEASE_ARGS --title "$ADDON_NAME v$ADDON_VERSION" --notes "Addon package, SHA-256 checksum, and CycloneDX SBOM."
