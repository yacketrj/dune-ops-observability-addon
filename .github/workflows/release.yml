name: Release addon

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y zip
      - name: Validate addon
        run: node scripts/validate.js
      - name: Check tag matches addon version
        run: |
          ADDON_VERSION="$(node -e "process.stdout.write(require('./addon.json').version)")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$ADDON_VERSION" != "$TAG_VERSION" ]; then
            echo "addon.json version must match tag version"
            exit 1
          fi
      - name: Package addon
        run: bash scripts/package.sh
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ADDON_NAME="$(node -e "process.stdout.write(require('./addon.json').name)")"
          ADDON_VERSION="$(node -e "process.stdout.write(require('./addon.json').version)")"
          PACKAGE_PATH="$(find dist -maxdepth 1 -type f -name '*.zip' | sort | head -n 1)"
          CHECKSUM_PATH="${PACKAGE_PATH}.sha256"
          gh release create "$GITHUB_REF_NAME" "$PACKAGE_PATH" "$CHECKSUM_PATH" --title "$ADDON_NAME v$ADDON_VERSION" --notes "Addon package and SHA-256 checksum."
