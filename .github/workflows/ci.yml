name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  shellcheck:
    name: Shell Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run ShellCheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck --severity=warning $(find . -name "*.sh" -not -path "./node_modules/*" -not -path "./.git/*")

  validate-json:
    name: Validate JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate JSON files
        run: |
          find . -name "*.json" -not -path "./node_modules/*" -not -path "./.git/*" -exec python3 -c "import json,sys; json.load(open(sys.argv[1]))" {} \; || { echo "Invalid JSON found"; exit 1; }
          echo "All JSON files valid"

  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
      - run: npm ci --ignore-scripts || true
      - run: npm audit --audit-level=moderate

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run semgrep
        run: |
          python3 -m pip install semgrep==1.170.0
          semgrep scan --config p/default --config p/secrets --error
      - name: Run trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln,misconfig,secret'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  ci-gate:
    name: CI Gate
    if: ${{ always() }}
    needs: [shellcheck, validate-json, npm-audit, security]
    runs-on: ubuntu-latest
    steps:
      - name: Require every check to pass
        env:
          SHELLCHECK: ${{ needs.shellcheck.result }}
          JSON: ${{ needs.validate-json.result }}
          NPM_AUDIT: ${{ needs.npm-audit.result }}
          SECURITY: ${{ needs.security.result }}
        run: |
          set -euo pipefail
          failed=0
          for result in "$SHELLCHECK" "$JSON" "$NPM_AUDIT" "$SECURITY"; do
            if [ "$result" != "success" ]; then
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            echo "One or more required checks did not passed."
            exit 1
          fi
          echo "All required checks passed."
